name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Maintain the release PR; on merge, bump Cargo.toml, write CHANGELOG.md,
  #    create the git tag, and publish a GitHub Release with curated notes. ──
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── When a release was just created, build the binaries and attach them to
  #    the release that release-please made (no PAT needed: workflow_call is a
  #    direct invocation, so it bypasses the GITHUB_TOKEN recursion guard). ──
  build-binaries:
    name: Build & attach binaries
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
      attach_only: true

  # ── Once the binaries are attached to the release, regenerate the formula in
  #    the Homebrew tap so `brew upgrade callrx` picks up the new version. ──
  update-homebrew:
    name: Update Homebrew tap
    needs: [release-please, build-binaries]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/update-homebrew.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
    secrets:
      tap_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
