name: Release

on:
  push:
    tags:
      - "v*"        # Trigger on version tags: v0.1.0, v1.2.3, etc.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and release (e.g. v0.1.0)"
        required: true
        type: string
  # Called by release-please.yml after it creates a release.
  workflow_call:
    inputs:
      tag:
        description: "Tag to build and attach binaries to"
        required: true
        type: string
      attach_only:
        description: "Skip release-note generation; only upload binaries to the existing release"
        type: boolean
        default: true

permissions:
  contents: write   # Needed to create GitHub releases and upload assets

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Build binaries for all platforms ──────────────────────────────────────
  build:
    name: Build · ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — Apple Silicon (M1/M2/M3)
          - name: macOS ARM64
            os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz

          # macOS — Intel
          - name: macOS x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz

          # Linux — x86_64 (most servers and desktops)
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz

          # Linux — ARM64 (Raspberry Pi 4+, cloud VMs)
          - name: Linux ARM64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
            archive: tar.gz

          # Linux — ARMv7 (Raspberry Pi 2/3, older devices)
          - name: Linux ARMv7
            os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            use_cross: true
            archive: tar.gz

          # Windows — x86_64
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            bin_suffix: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Install cross for targets that need it (ARM Linux)
      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      # Build with cross (ARM) or native cargo (everything else)
      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.use_cross != true
        run: cargo build --release --locked --target ${{ matrix.target }}

      # ── Package the binary ───────────────────────────────────────────────

      - name: Package (Unix tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BIN_NAME="callrx"
          TARGET="${{ matrix.target }}"
          RELEASE_DIR="target/${TARGET}/release"
          ARCHIVE_NAME="${BIN_NAME}-${{ inputs.tag || github.ref_name }}-${TARGET}.tar.gz"

          # Substitute @@VERSION@@ in the man page and stage it for packaging.
          VERSION_STR="${{ inputs.tag || github.ref_name }}"
          VERSION_STR="${VERSION_STR#v}"
          mkdir -p /tmp/man_staging/man
          sed "s/@@VERSION@@/${VERSION_STR}/g" man/callrx.1 > /tmp/man_staging/man/callrx.1

          # Include the binary (from the release dir), README, LICENSE, and the
          # man page (from the staging dir). Each -C only affects the paths that follow.
          tar -czf "${ARCHIVE_NAME}" \
            -C "${RELEASE_DIR}" "${BIN_NAME}" \
            -C "${GITHUB_WORKSPACE}" README.md LICENSE \
            -C /tmp/man_staging man/callrx.1

          echo "ASSET=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Package (Windows zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $BIN_NAME = "callrx.exe"
          $TARGET = "${{ matrix.target }}"
          $RELEASE_DIR = "target\$TARGET\release"
          $ARCHIVE_NAME = "callrx-${{ inputs.tag || github.ref_name }}-$TARGET.zip"

          Compress-Archive -Path "$RELEASE_DIR\$BIN_NAME", "README.md", "LICENSE" `
            -DestinationPath $ARCHIVE_NAME

          echo "ASSET=$ARCHIVE_NAME" | Out-File -FilePath $env:GITHUB_ENV -Append

      # ── Generate SHA256 checksum ─────────────────────────────────────────

      - name: Generate SHA256 (Unix)
        if: runner.os != 'Windows'
        run: shasum -a 256 "${{ env.ASSET }}" > "${{ env.ASSET }}.sha256"

      - name: Generate SHA256 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = Get-FileHash "${{ env.ASSET }}" -Algorithm SHA256
          "$($hash.Hash.ToLower())  ${{ env.ASSET }}" | Out-File "${{ env.ASSET }}.sha256"

      # ── Upload build artifacts ───────────────────────────────────────────

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256

  # ── Create GitHub Release and attach all binaries ─────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: "callrx ${{ inputs.tag || github.ref_name }}"
          draft: false
          prerelease: ${{ contains(inputs.tag || github.ref_name, '-') }}   # e.g. v1.0.0-beta
          # release-please already wrote the notes; only generate them for
          # standalone tag-push / manual runs (attach_only is unset there).
          generate_release_notes: ${{ !inputs.attach_only }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.sha256
