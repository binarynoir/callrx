name: Release

# Bump the version in Cargo.toml/Cargo.lock, commit, tag, and publish a GitHub
# release, then build and attach cross-platform binaries and refresh the
# Homebrew tap. Same manual bump-driven versioning as callrx-service,
# callrx-frontend, and callrx-cli-admin's own release workflows.
#
# Run from: Actions → Release → Run workflow (main branch only)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      release_notes:
        description: "Release notes (optional — leave blank to auto-generate from commits)"
        required: false
        type: string

permissions:
  contents: write # Needed to create GitHub releases and upload assets

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Bump version, tag, and publish the release ─────────────────────────────
  version:
    name: Bump version and publish release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version in Cargo.toml / Cargo.lock
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          python3 - << 'PYEOF'
          import re, sys, os

          def bump_version(path: str, new_version: str) -> None:
              content = open(path).read()
              match = re.search(r'(?m)^name = "callrx"\nversion = "(\d+)\.(\d+)\.(\d+)"', content)
              if not match:
                  print(f"ERROR: callrx version not found in {path}", file=sys.stderr)
                  sys.exit(1)
              new_content = (
                  content[: match.start()]
                  + f'name = "callrx"\nversion = "{new_version}"'
                  + content[match.end() :]
              )
              open(path, "w").write(new_content)

          toml_match = re.search(
              r'(?m)^name = "callrx"\nversion = "(\d+)\.(\d+)\.(\d+)"',
              open("Cargo.toml").read(),
          )
          if not toml_match:
              print("ERROR: callrx version not found in Cargo.toml", file=sys.stderr)
              sys.exit(1)

          major, minor, patch = (int(g) for g in toml_match.groups())
          old_version = f"{major}.{minor}.{patch}"

          bump = os.environ["BUMP"]
          if bump == "major":
              major += 1
              minor = 0
              patch = 0
          elif bump == "minor":
              minor += 1
              patch = 0
          else:
              patch += 1

          new_version = f"{major}.{minor}.{patch}"
          bump_version("Cargo.toml", new_version)
          bump_version("Cargo.lock", new_version)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"new_version={new_version}\n")
              f.write(f"tag=v{new_version}\n")

          print(f"Bumped: {old_version} → {new_version}")
          PYEOF

      - name: Commit version bump and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to ${{ steps.version.outputs.tag }} [skip ci]"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin main
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if [ -z "$RELEASE_NOTES" ]; then
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "$RELEASE_NOTES"
          fi

  # ── Build binaries for all platforms ──────────────────────────────────────
  build:
    name: Build · ${{ matrix.name }}
    needs: version
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — Apple Silicon (M1/M2/M3)
          - name: macOS ARM64
            os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz

          # Linux — x86_64 (most servers and desktops)
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz

          # Linux — ARM64 (Raspberry Pi 4+, cloud VMs)
          - name: Linux ARM64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
            archive: tar.gz

          # Linux — ARMv7 (Raspberry Pi 2/3, older devices)
          - name: Linux ARMv7
            os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            use_cross: true
            archive: tar.gz

          # Windows — x86_64
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            bin_suffix: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Install cross for targets that need it (ARM Linux)
      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      # Build with cross (ARM) or native cargo (everything else).
      # CALLRX_API_URL is baked into the binary at compile time via option_env!.
      # For cross builds it reaches the build container via Cross.toml passthrough.
      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --locked --target ${{ matrix.target }}
        env:
          CALLRX_API_URL: ${{ secrets.CALLRX_API_URL }}

      - name: Build (native)
        if: matrix.use_cross != true
        run: cargo build --release --locked --target ${{ matrix.target }}
        env:
          CALLRX_API_URL: ${{ secrets.CALLRX_API_URL }}

      # ── Package the binary ───────────────────────────────────────────────

      - name: Package (Unix tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BIN_NAME="callrx"
          TARGET="${{ matrix.target }}"
          RELEASE_DIR="target/${TARGET}/release"
          TAG="${{ needs.version.outputs.tag }}"
          ARCHIVE_NAME="${BIN_NAME}-${TAG}-${TARGET}.tar.gz"

          # Substitute @@VERSION@@ in the man page and stage it for packaging.
          VERSION_STR="${TAG#v}"
          mkdir -p /tmp/man_staging/man
          sed "s/@@VERSION@@/${VERSION_STR}/g" man/callrx.1 > /tmp/man_staging/man/callrx.1

          # Include the binary (from the release dir), README, LICENSE, and the
          # man page (from the staging dir). Each -C only affects the paths that follow.
          tar -czf "${ARCHIVE_NAME}" \
            -C "${RELEASE_DIR}" "${BIN_NAME}" \
            -C "${GITHUB_WORKSPACE}" README.md LICENSE \
            -C /tmp/man_staging man/callrx.1

          echo "ASSET=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Package (Windows zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $BIN_NAME = "callrx.exe"
          $TARGET = "${{ matrix.target }}"
          $RELEASE_DIR = "target\$TARGET\release"
          $TAG = "${{ needs.version.outputs.tag }}"
          $ARCHIVE_NAME = "callrx-$TAG-$TARGET.zip"

          Compress-Archive -Path "$RELEASE_DIR\$BIN_NAME", "README.md", "LICENSE" `
            -DestinationPath $ARCHIVE_NAME

          echo "ASSET=$ARCHIVE_NAME" | Out-File -FilePath $env:GITHUB_ENV -Append

      # ── Generate SHA256 checksum ─────────────────────────────────────────

      - name: Generate SHA256 (Unix)
        if: runner.os != 'Windows'
        run: shasum -a 256 "${{ env.ASSET }}" > "${{ env.ASSET }}.sha256"

      - name: Generate SHA256 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = Get-FileHash "${{ env.ASSET }}" -Algorithm SHA256
          "$($hash.Hash.ToLower())  ${{ env.ASSET }}" | Out-File "${{ env.ASSET }}.sha256"

      # ── Upload build artifacts ───────────────────────────────────────────

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256

  # ── Attach all built binaries to the release the version job created ──────
  attach:
    name: Attach binaries to release
    needs: [version, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.version.outputs.tag }}" \
            artifacts/*.tar.gz artifacts/*.zip artifacts/*.sha256 \
            --repo "${{ github.repository }}" \
            --clobber

  # ── Once the binaries are attached, regenerate the formula in the Homebrew
  #    tap so `brew upgrade callrx` picks up the new version. ─────────────────
  update-homebrew:
    name: Update Homebrew tap
    needs: [version, attach]
    uses: ./.github/workflows/update-homebrew.yml
    with:
      tag: ${{ needs.version.outputs.tag }}
    secrets:
      tap_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
